openapi: 3.1.0
info:
  title: Test-Suit
  version: 1.0.0
  description: fragment of the overall test suit

paths:
  /features/oneOf/withoutDiscriminator:
    post:
      tags:
        - oneOf
      operationId: oneOfWithoutDiscriminator
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OneOfWithoutDiscriminator'
      responses:
        '200':
          description: Ok
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OneOfWithoutDiscriminator'
        '400':
          $ref: '#/components/responses/OperationError400'

  /features/oneOf/withDiscriminator:
    post:
      tags:
        - oneOf
      operationId: oneOfWithDiscriminator
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OneOfWithDiscriminator'
      responses:
        '200':
          description: Ok
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OneOfWithDiscriminator'
        '400':
          $ref: '#/components/responses/OperationError400'

  /features/oneOf/withDiscriminatorAsEnum:
    post:
      tags:
        - oneOf
      operationId: oneOfWithDiscriminatorAsEnum
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OneOfWithDiscriminatorAsEnum'
      responses:
        '200':
          description: Ok
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OneOfWithDiscriminatorAsEnum'
        '400':
          $ref: '#/components/responses/OperationError400'

  /features/oneOf/withDiscriminatorAndMapping:
    post:
      tags:
        - oneOf
      operationId: oneOfWithDiscriminatorAndMapping
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OneOfWithDiscriminatorAndMapping'
      responses:
        '200':
          description: Ok
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OneOfWithDiscriminatorAndMapping'
        '400':
          $ref: '#/components/responses/OperationError400'

  /features/oneOf/withDiscriminatorAndMappingAsEnum:
    post:
      tags:
        - oneOf
      operationId: oneOfWithDiscriminatorAndMappingAsEnum
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OneOfWithDiscriminatorAndMappingAsEnum'
      responses:
        '200':
          description: Ok
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OneOfWithDiscriminatorAndMappingAsEnum'
        '400':
          $ref: '#/components/responses/OperationError400'


components:

  schemas:
    OneOfWithoutDiscriminator:
      oneOf:
        - $ref: '#/components/schemas/Book'
        - $ref: '#/components/schemas/Song'
          type:
            - 'null'
          x-container-model-name: OneOfWithoutDiscriminatorSong

    OneOfWithDiscriminator:
      oneOf:
        - $ref: '#/components/schemas/Book'
        - $ref: '#/components/schemas/Song'
      discriminator:
        propertyName: kind

    OneOfWithDiscriminatorAsEnum:
      oneOf:
        - $ref: '#/components/schemas/Picture'
        - $ref: '#/components/schemas/Song'
      discriminator:
        propertyName: kind

    OneOfWithDiscriminatorAndMapping:
      oneOf:
        - $ref: '#/components/schemas/Book'
        - $ref: '#/components/schemas/Song'
      discriminator:
        propertyName: kind
        mapping:
          booooook: '#/components/schemas/Book'

    OneOfWithDiscriminatorAndMappingAsEnum:
      oneOf:
        - $ref: '#/components/schemas/Statue'
        - $ref: '#/components/schemas/Song'
      discriminator:
        propertyName: kind
        mapping:
          Thing: '#/components/schemas/Statue'

    Book:
      type: object
      properties:
        title:
          type: string
        pages:
          type: number
          format: int32
        kind:
          type: string
      required:
        - title
        - pages
        - kind

    Picture:
      type: object
      properties:
        title:
          type: string
        artist:
          type: string
        kind:
          type: string
          enum:
            - Picture
          default: Picture
      required:
        - title
        - artist
        - kind

    Statue:
      type: object
      properties:
        title:
          type: string
        artist:
          type: string
        kind:
          type: string
          enum:
            - Thing
          default: Thing
      required:
        - title
        - artist
        - kind

    Song:
      type: object
      properties:
        title:
          type: string
        duration:
          type: number
          format: int32
        kind:
          type: string
      required:
        - title
        - duration
        - kind

    OperationError:
      type: object
      properties:
        messages:
          type: array
          items:
            type: string
      required:
        - messages

  responses:
    OperationError400:
      description: Bad request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/OperationError'
